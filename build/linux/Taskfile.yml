version: "3"

includes:
  common: ../Taskfile.yml

vars:
  GENERATED_DIR: dist/desktop/.wails-build

tasks:
  build:
    desc: Build the production GTK3 Linux executable
    platforms: [linux]
    run: once
    deps:
      - task: common:prepare
      - task: common:verify:metadata
        vars:
          {
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
          }
      - task: common:generate:assets
        vars:
          {
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
          }
    cmds:
      - rm -rf dist/desktop/linux-{{.ARCH}} && mkdir -p dist/desktop/linux-{{.ARCH}}
      - >-
        go build -trimpath -buildvcs=false
        -tags production,release_assets,gtk3
        -ldflags "-w -s -X github.com/jftrade/jftrade-main/internal/buildinfo.Version={{.VERSION}} -X github.com/jftrade/jftrade-main/internal/buildinfo.Commit={{.COMMIT}} -X github.com/jftrade/jftrade-main/internal/buildinfo.BuildTime={{.BUILD_TIME}}"
        -o dist/desktop/linux-{{.ARCH}}/jftrade-desktop-linux-{{.ARCH}} ./cmd/jftrade-desktop
    env:
      GOOS: linux
      GOARCH: "{{.ARCH}}"
      CGO_ENABLED: "1"
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'

  generate:desktop:
    internal: true
    run: once
    cmds:
      - mkdir -p dist/desktop-release/.staging/linux-{{.ARCH}}
      - >-
        go tool wails3 generate .desktop -name JFTrade -exec jftrade-desktop
        -icon JFTrade -outputfile dist/desktop-release/.staging/linux-{{.ARCH}}/JFTrade.desktop
        -categories "Finance;Development;"
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'

  package:
    desc: Build AppImage, deb and rpm Linux release assets
    deps:
      - task: build
        vars:
          {
            ARCH: "{{.ARCH}}",
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
          }
    cmds:
      - rm -rf dist/desktop-release/linux-{{.ARCH}} dist/desktop-release/.staging/linux-{{.ARCH}}
      - task: package:appimage
        vars:
          {
            ARCH: "{{.ARCH}}",
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
          }
      - task: package:linux
        vars:
          {
            ARCH: "{{.ARCH}}",
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
            FORMAT: deb,
          }
      - task: package:linux
        vars:
          {
            ARCH: "{{.ARCH}}",
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
            FORMAT: rpm,
          }
      - >-
        node scripts/manage-linux-release-artifacts.mjs verify
        {{.VERSION}} {{.ARCH}} dist/desktop-release/linux-{{.ARCH}}
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'

  package:appimage:
    desc: Build an AppImage with the Wails generator
    deps:
      - task: build
        vars:
          {
            ARCH: "{{.ARCH}}",
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
          }
      - task: generate:desktop
        vars: { ARCH: "{{.ARCH}}" }
    cmds:
      - rm -rf dist/desktop-release/.staging/linux-{{.ARCH}}/appimage
      - mkdir -p dist/desktop-release/.staging/linux-{{.ARCH}}/appimage/output
      - cp build/desktop/appicon.png dist/desktop-release/.staging/linux-{{.ARCH}}/appimage/JFTrade.png
      - >-
        LDAI_COMP=xz go tool wails3 generate appimage
        -binary dist/desktop/linux-{{.ARCH}}/jftrade-desktop-linux-{{.ARCH}}
        -icon dist/desktop-release/.staging/linux-{{.ARCH}}/appimage/JFTrade.png
        -desktopfile dist/desktop-release/.staging/linux-{{.ARCH}}/JFTrade.desktop
        -outputdir dist/desktop-release/.staging/linux-{{.ARCH}}/appimage/output
        -builddir dist/desktop-release/.staging/linux-{{.ARCH}}/appimage/build
      - >-
        node scripts/manage-linux-release-artifacts.mjs finalize
        appimage {{.VERSION}} {{.ARCH}}
        dist/desktop-release/.staging/linux-{{.ARCH}}/appimage/output
        dist/desktop-release/linux-{{.ARCH}}
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'

  package:linux:
    desc: Build a deb or rpm package with the Wails packager
    deps:
      - task: build
        vars:
          {
            ARCH: "{{.ARCH}}",
            VERSION: "{{.VERSION}}",
            COMMIT: "{{.COMMIT}}",
            BUILD_TIME: "{{.BUILD_TIME}}",
          }
      - task: generate:desktop
        vars: { ARCH: "{{.ARCH}}" }
    cmds:
      - rm -rf dist/desktop-release/.staging/linux-{{.ARCH}}/{{.FORMAT}}
      - mkdir -p dist/desktop-release/.staging/linux-{{.ARCH}}/{{.FORMAT}}
      - >-
        node scripts/prepare-linux-package-config.mjs
        build/linux/nfpm.yaml dist/desktop-release/.staging/linux-{{.ARCH}}/{{.FORMAT}}/nfpm.yaml
        {{.VERSION}} {{.ARCH}}
        {{.ROOT_DIR}}/dist/desktop/linux-{{.ARCH}}/jftrade-desktop-linux-{{.ARCH}}
        {{.ROOT_DIR}}/dist/desktop-release/.staging/linux-{{.ARCH}}/JFTrade.desktop
        {{.ROOT_DIR}}/build/desktop/appicon.png
        {{.ROOT_DIR}}/LICENSE
        {{.ROOT_DIR}}/docs/legal/third-party-notices.md
      - >-
        go tool wails3 tool package -name jftrade -format {{.FORMAT}}
        -config dist/desktop-release/.staging/linux-{{.ARCH}}/{{.FORMAT}}/nfpm.yaml
        -out dist/desktop-release/.staging/linux-{{.ARCH}}/{{.FORMAT}}
      - >-
        node scripts/manage-linux-release-artifacts.mjs finalize
        {{.FORMAT}} {{.VERSION}} {{.ARCH}}
        dist/desktop-release/.staging/linux-{{.ARCH}}/{{.FORMAT}}
        dist/desktop-release/linux-{{.ARCH}}
    preconditions:
      - sh: test "{{.FORMAT}}" = "deb" || test "{{.FORMAT}}" = "rpm"
        msg: FORMAT must be deb or rpm
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'
      FORMAT: '{{.FORMAT | default "deb"}}'
