name: jftrade
arch: __ARCH__
platform: linux
version: __VERSION__
section: finance
priority: optional
maintainer: JFTrade Maintainers <38273998+Dennishaha@users.noreply.github.com>
description: JFTrade desktop application
vendor: JFTrade
homepage: https://github.com/Dennishaha/jftrade
license: AGPL-3.0-only
contents:
  - src: __BINARY__
    dst: /usr/bin/jftrade-desktop
  - src: __ICON__
    dst: /usr/share/icons/hicolor/512x512/apps/JFTrade.png
  - src: __DESKTOP_FILE__
    dst: /usr/share/applications/JFTrade.desktop
  - src: __LICENSE__
    dst: /usr/share/licenses/jftrade/LICENSE
  - src: __THIRD_PARTY_NOTICES__
    dst: /usr/share/licenses/jftrade/THIRD-PARTY-NOTICES.md
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0
overrides:
  rpm:
    depends: [gtk3, webkit2gtk4.1]
