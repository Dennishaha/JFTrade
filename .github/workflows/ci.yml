name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go Quality & Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOFLAGS: "-tags=gtk3"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install Linux desktop and CI dependencies
        run: |
          bash scripts/install-linux-desktop-dependencies.sh
          sudo apt-get install -y ripgrep

      - name: Install revive
        run: |
          go install github.com/mgechev/revive@v1.15.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Wails doctor
        run: npm run desktop:doctor

      - name: Generate OpenAPI contract
        run: npm run generate:openapi

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          args: --timeout=5m --build-tags=gtk3

      - name: Go production file length gate
        shell: bash
        run: |
          set -euo pipefail
          list_file="$(mktemp)"
          trap 'rm -f "$list_file"' EXIT
          find cmd internal pkg -type f -name '*.go' ! -name '*_test.go' -print0 >"$list_file" 2>/dev/null

          files=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.pb.go|*/pb/*)
                continue
                ;;
            esac

            first_line="$(sed -n '1p' "$file")"
            if [[ "$first_line" =~ ^//[[:space:]]Code[[:space:]]generated.*DO[[:space:]]NOT[[:space:]]EDIT\.?$ ]]; then
              continue
            fi

            files+=("$file")
          done <"$list_file"

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No production Go files matched revive gate."
            exit 0
          fi

          revive -config .revive-file-length-prod.toml -set_exit_status "${files[@]}"

      - name: Go test file length gate
        shell: bash
        run: |
          set -euo pipefail
          list_file="$(mktemp)"
          trap 'rm -f "$list_file"' EXIT
          find cmd internal pkg -type f -name '*_test.go' -print0 >"$list_file" 2>/dev/null

          files=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.pb.go|*/pb/*)
                continue
                ;;
            esac

            first_line="$(sed -n '1p' "$file")"
            if [[ "$first_line" =~ ^//[[:space:]]Code[[:space:]]generated.*DO[[:space:]]NOT[[:space:]]EDIT\.?$ ]]; then
              continue
            fi

            files+=("$file")
          done <"$list_file"

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No test Go files matched revive gate."
            exit 0
          fi

          revive -config .revive-file-length-test.toml -set_exit_status "${files[@]}"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test command packages
        run: go test ./cmd/... -count=1 -timeout 300s

      - name: Wails bindings are current
        run: npm run check:wails-bindings

      - name: Architecture dependency check
        run: bash scripts/check-arch-deps.sh

  go-coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CGO_ENABLED: "0"
      GO_COVERAGE_PACKAGES: ./internal/... ./pkg/... ./scripts
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use declared npm version
        run: npm install --global npm@10.9.7 --no-audit --no-fund

      - name: Install PineTS integration dependency
        run: npm ci --workspace @jftrade/pineworker --include-workspace-root=false --omit=dev --no-audit --no-fund

      - name: Generate OpenAPI test dependency
        run: npm run generate:openapi

      - name: Go coverage gate
        run: npm run test:coverage:go

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use declared npm version
        run: npm install --global npm@10.9.7 --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm ci --workspace @jftrade/web --include-workspace-root=true --no-audit --no-fund

      - name: Frontend test
        run: npm run test:web:ci

      - name: Frontend typecheck
        run: npm run typecheck:web

      - name: Frontend embedded asset build
        run: npm run build:frontend-assets

      - name: Frontend release asset test
        run: go test -tags release_assets ./internal/frontendassets -run TestFileSystem

      - name: Desktop release script tests
        run: |
          npm run test:desktop-release-metadata
          npm run test:desktop-release-inputs
          npm run test:desktop-mac-bundle
          npm run test:desktop-windows-resource-metadata
          node scripts/dev-desktop.test.mjs

      - name: Upload frontend build input
        uses: actions/upload-artifact@v7
        with:
          name: ci-web-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/frontendassets/dist.zip
          if-no-files-found: error
          retention-days: 1

  pine:
    name: Pine & Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use declared npm version
        run: npm install --global npm@10.9.7 --no-audit --no-fund

      - name: Install Pine dependencies
        run: npm ci --workspace @jftrade/pineworker --include-workspace-root=false --no-audit --no-fund

      - name: PineTS worker test
        run: npm run test:pineworker

      - name: PineTS worker typecheck
        run: npm run typecheck:pineworker

      - name: Generate Pine contract
        run: |
          go run ./cmd/generate-pine-spec-docs -out docs/reference/generated
          git diff --exit-code -- docs/reference/generated/pine-v6-support.md

      - name: PineTS release check script test
        run: npm run test:pinets-release-check

      - name: PineTS compliance notice check
        run: npm run check:pinets-compliance

      - name: PineTS shadow corpus report
        env:
          JFTRADE_PINETS_SHADOW_REPORT_PATH: ${{ github.workspace }}/artifacts/pinets-shadow/report.json
        run: |
          mkdir -p artifacts/pinets-shadow
          npm run test:pinets-shadow-corpus

      - name: Upload PineTS shadow corpus report
        if: ${{ always() && hashFiles('artifacts/pinets-shadow/report.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: pinets-shadow-corpus-${{ github.run_id }}
          path: artifacts/pinets-shadow/report.json
          if-no-files-found: warn

      - name: PineTS worker asset build script test
        run: npm run test:pineworker-asset-build

      - name: Build PineTS worker input
        run: npm run build:pineworker

      - name: Verify embedded PineTS worker input
        run: go test -tags release_assets ./internal/pineworkerassets -count=1

      - name: Upload PineTS worker build input
        uses: actions/upload-artifact@v7
        with:
          name: ci-pine-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/pineworkerassets/assets/bin/worker.mjs
          if-no-files-found: error
          retention-days: 1

  linux-desktop-build:
    name: Linux Desktop Build
    needs: [web, pine]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      JFTRADE_DESKTOP_PREPARED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Download frontend build input
        uses: actions/download-artifact@v8
        with:
          name: ci-web-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/frontendassets

      - name: Download PineTS worker build input
        uses: actions/download-artifact@v8
        with:
          name: ci-pine-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/pineworkerassets/assets/bin

      - name: Install Linux desktop dependencies
        run: bash scripts/install-linux-desktop-dependencies.sh

      - name: Generate OpenAPI build input
        run: npm run generate:openapi

      - name: Test Linux release profile
        run: go test -tags release_assets,gtk3 ./cmd/jftrade-desktop ./internal/desktop -count=1

      - name: Build Linux desktop binary
        run: npm run desktop:build:linux

      - name: Verify Linux desktop binary
        id: artifact
        run: |
          artifact="dist/desktop/linux-amd64/jftrade-desktop-linux-amd64"
          test -x "$artifact"
          file "$artifact" | grep -q 'ELF 64-bit'
          go version -m "$artifact" | tee /tmp/jftrade-linux-buildinfo.txt
          grep -q 'github.com/jftrade/jftrade-main/cmd/jftrade-desktop' /tmp/jftrade-linux-buildinfo.txt
          ldd "$artifact" | tee /tmp/jftrade-linux-ldd.txt
          ! grep -q 'not found' /tmp/jftrade-linux-ldd.txt
          echo "path=$artifact" >> "$GITHUB_OUTPUT"

      - name: Upload Linux desktop binary
        uses: actions/upload-artifact@v7
        with:
          name: ci-linux-desktop-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 1

  build-and-test:
    name: Build & Test
    if: ${{ always() }}
    needs: [go-quality, go-coverage, web, pine, linux-desktop-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all CI lanes
        env:
          GO_QUALITY_RESULT: ${{ needs.go-quality.result }}
          GO_COVERAGE_RESULT: ${{ needs.go-coverage.result }}
          WEB_RESULT: ${{ needs.web.result }}
          PINE_RESULT: ${{ needs.pine.result }}
          LINUX_DESKTOP_RESULT: ${{ needs.linux-desktop-build.result }}
        run: |
          if [[ "$GO_QUALITY_RESULT" != "success" || "$GO_COVERAGE_RESULT" != "success" || "$WEB_RESULT" != "success" || "$PINE_RESULT" != "success" || "$LINUX_DESKTOP_RESULT" != "success" ]]; then
            echo "Go Quality & Contracts: $GO_QUALITY_RESULT"
            echo "Go Coverage: $GO_COVERAGE_RESULT"
            echo "Web: $WEB_RESULT"
            echo "Pine & Workers: $PINE_RESULT"
            echo "Linux Desktop Build: $LINUX_DESKTOP_RESULT"
            exit 1
          fi
