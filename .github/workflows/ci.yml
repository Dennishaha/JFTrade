name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go Quality & Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOFLAGS: "-tags=gtk3"
      JFTRADE_DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Linux desktop and CI dependencies
        run: |
          bash scripts/install-linux-desktop-dependencies.sh
          sudo apt-get install -y ripgrep

      - name: Install revive
        run: |
          go install github.com/mgechev/revive@v1.15.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Wails doctor
        run: pnpm run desktop:doctor

      - name: Generate OpenAPI contract
        run: pnpm run generate:openapi

      - name: Generate web API types
        run: pnpm run generate:api-types

      - name: Verify tracked contract artifacts are up to date
        run: git diff --exit-code -- apps/web/src/generated/openapi.ts tests/fixtures/openapi-baseline.json

      - name: Test filename policy
        run: |
          pnpm run test:test-policy
          pnpm run check:test-names

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          args: --timeout=5m --build-tags=gtk3 --max-issues-per-linter=0 --max-same-issues=0

      - name: Go production file length gate
        shell: bash
        run: |
          set -euo pipefail
          list_file="$(mktemp)"
          trap 'rm -f "$list_file"' EXIT
          find cmd internal pkg -type f -name '*.go' ! -name '*_test.go' -print0 >"$list_file" 2>/dev/null

          files=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.pb.go|*/pb/*)
                continue
                ;;
            esac

            first_line="$(sed -n '1p' "$file")"
            if [[ "$first_line" =~ ^//[[:space:]]Code[[:space:]]generated.*DO[[:space:]]NOT[[:space:]]EDIT\.?$ ]]; then
              continue
            fi

            files+=("$file")
          done <"$list_file"

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No production Go files matched revive gate."
            exit 0
          fi

          revive -config .revive-file-length-prod.toml -set_exit_status "${files[@]}"

      - name: Go test file length gate
        shell: bash
        run: |
          set -euo pipefail
          list_file="$(mktemp)"
          trap 'rm -f "$list_file"' EXIT
          find cmd internal pkg -type f -name '*_test.go' -print0 >"$list_file" 2>/dev/null

          files=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.pb.go|*/pb/*)
                continue
                ;;
            esac

            first_line="$(sed -n '1p' "$file")"
            if [[ "$first_line" =~ ^//[[:space:]]Code[[:space:]]generated.*DO[[:space:]]NOT[[:space:]]EDIT\.?$ ]]; then
              continue
            fi

            files+=("$file")
          done <"$list_file"

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No test Go files matched revive gate."
            exit 0
          fi

          revive -config .revive-file-length-test.toml -set_exit_status "${files[@]}"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Go vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Test command packages
        run: go test ./cmd/... -count=1 -timeout 300s

      - name: Wails bindings are current
        run: pnpm run check:wails-bindings

      - name: Architecture dependency check
        run: bash scripts/check-arch-deps.sh

  proto-generation:
    name: Proto Generation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test cross-platform proto generators
        run: |
          go test ./cmd/generate-futu-proto ./cmd/generate-pineworker-proto ./cmd/internal/protogen -count=1 -timeout 120s
          go run ./cmd/generate-futu-proto -verify-repository

      - name: Validate cross-platform pnpm lockfile
        run: pnpm install --lockfile-only --frozen-lockfile

  go-coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CGO_ENABLED: "0"
      JFTRADE_DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install PineTS integration dependency
        run: pnpm --filter @jftrade/pineworker install --prod --frozen-lockfile

      - name: Generate OpenAPI test dependency
        run: pnpm run generate:openapi

      - name: Go coverage gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/coverage
          pnpm run test:coverage:go -- -package ./cmd/jftrade-api -package ./internal/... -package ./pkg/... -package ./scripts 2>&1 | tee artifacts/coverage/go.txt
          go test ./internal/marketdata ./internal/integration/futu -run Concurrent -count=20 -timeout=120s 2>&1 | tee artifacts/coverage/go-concurrency.txt

      - name: Full deterministic Go regression (main)
        if: ${{ github.event_name == 'push' }}
        run: go test ./... -count=1 -timeout=300s

      - name: Summarize Go coverage
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Go coverage"
            if [[ -f artifacts/coverage/go.txt ]]; then
              grep -E '^Go (diff )?coverage:|^Critical ' artifacts/coverage/go.txt || true
            else
              echo "Coverage command did not produce a report."
            fi
            echo "Full output: ci-go-coverage-${{ github.run_id }}-${{ github.run_attempt }} artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-go-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/coverage
          if-no-files-found: warn
          retention-days: 7

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      JFTRADE_DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit locked pnpm dependencies
        run: pnpm run audit:dependencies

      - name: OSS license compliance
        run: pnpm run check:oss-license

      - name: Frontend test and coverage gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/coverage
          pnpm run test:coverage:web 2>&1 | tee artifacts/coverage/web.txt

      - name: Summarize Web coverage
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Web coverage"
            if [[ -f artifacts/coverage/web.txt ]]; then
              grep -E 'All files|Web diff coverage:|Statements|Branches|Functions|Lines' artifacts/coverage/web.txt || true
            else
              echo "Coverage command did not produce a report."
            fi
            echo "Full output and JSON report: ci-web-coverage-${{ github.run_id }}-${{ github.run_attempt }} artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Web coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-web-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/coverage/web.txt
            apps/web/coverage
          if-no-files-found: warn
          retention-days: 7

      - name: Frontend typecheck
        run: pnpm run typecheck:web

      - name: Frontend embedded asset build
        run: pnpm run build:frontend-assets

      - name: Frontend release asset test
        run: go test -tags release_assets ./internal/frontendassets -run TestFileSystem

      - name: Desktop release script tests
        run: |
          pnpm run test:desktop-release-metadata
          pnpm run test:desktop-release-artifacts
          pnpm run test:desktop-linux-artifacts
          pnpm run test:desktop-release-inputs
          pnpm run test:desktop-wails-tasks
          pnpm run test:desktop-signing
          pnpm run test:desktop-linux-package-config
          node scripts/dev-desktop.test.mjs

      - name: Upload frontend build input
        uses: actions/upload-artifact@v7
        with:
          name: ci-web-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/frontendassets/dist.zip
          if-no-files-found: error
          retention-days: 1

  pine:
    name: Pine & Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Pine dependencies
        run: pnpm --filter @jftrade/pineworker install --frozen-lockfile

      - name: PineTS worker test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/coverage
          pnpm run test:coverage:worker 2>&1 | tee artifacts/coverage/pineworker.txt

      - name: Summarize PineTS worker coverage
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## PineTS worker coverage"
            if [[ -f artifacts/coverage/pineworker.txt ]]; then
              grep -E 'All files|Statements|Branches|Functions|Lines' artifacts/coverage/pineworker.txt || true
            else
              echo "Coverage command did not produce a report."
            fi
            echo "Full output and JSON report: ci-pineworker-coverage-${{ github.run_id }}-${{ github.run_attempt }} artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PineTS worker coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-pineworker-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/coverage/pineworker.txt
            workers/pineworker/coverage
          if-no-files-found: warn
          retention-days: 7

      - name: PineTS worker typecheck
        run: pnpm run typecheck:pineworker

      - name: Generate Pine contract
        run: |
          go run ./cmd/generate-pine-spec-docs -out docs/reference/generated
          git diff --exit-code -- docs/reference/generated/pine-v6-support.md

      - name: PineTS release check script test
        run: pnpm run test:pinets-release-check

      - name: PineTS compliance notice check
        run: pnpm run check:pinets-compliance

      - name: PineTS shadow corpus report
        env:
          JFTRADE_PINETS_SHADOW_REPORT_PATH: ${{ github.workspace }}/artifacts/pinets-shadow/report.json
        run: |
          mkdir -p artifacts/pinets-shadow
          pnpm run test:pinets-shadow-corpus

      - name: Upload PineTS shadow corpus report
        if: ${{ always() && hashFiles('artifacts/pinets-shadow/report.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: pinets-shadow-corpus-${{ github.run_id }}
          path: artifacts/pinets-shadow/report.json
          if-no-files-found: warn

      - name: PineTS worker asset build script test
        run: pnpm run test:pineworker-asset-build

      - name: Build PineTS worker input
        run: pnpm run build:pineworker

      - name: Verify embedded PineTS worker input
        run: go test -tags release_assets ./internal/pineworkerassets -count=1

      - name: Real PineTS backtest smoke (main)
        if: ${{ github.event_name == 'push' }}
        run: pnpm run smoke:pinets-backtest

      - name: Upload PineTS worker build input
        uses: actions/upload-artifact@v7
        with:
          name: ci-pine-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/pineworkerassets/assets/bin/worker.mjs
          if-no-files-found: error
          retention-days: 1

  desktop-linux-smoke:
    name: Desktop Linux Smoke (PR)
    if: ${{ github.event_name == 'pull_request' }}
    needs: [web, pine]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      JFTRADE_DESKTOP_PREPARED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download frontend build input
        uses: actions/download-artifact@v8
        with:
          name: ci-web-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/frontendassets

      - name: Download PineTS worker build input
        uses: actions/download-artifact@v8
        with:
          name: ci-pine-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/pineworkerassets/assets/bin

      - name: Install Linux desktop dependencies
        run: bash scripts/install-linux-desktop-dependencies.sh

      - name: Generate OpenAPI build input
        run: pnpm run generate:openapi

      - name: Test desktop release profile
        run: go test -tags production,release_assets,gtk3 ./cmd/jftrade-desktop ./internal/desktop -count=1

      - name: Build Linux desktop application
        run: pnpm run desktop:build:linux

      - name: Verify Linux desktop binary
        run: |
          artifact="dist/desktop/linux-amd64/jftrade-desktop-linux-amd64"
          test -x "$artifact"
          file "$artifact" | grep -q 'ELF 64-bit'
          go version -m "$artifact" | tee /tmp/jftrade-linux-buildinfo.txt
          grep -q 'github.com/jftrade/jftrade-main/cmd/jftrade-desktop' /tmp/jftrade-linux-buildinfo.txt
          ldd "$artifact" | tee /tmp/jftrade-linux-ldd.txt
          ! grep -q 'not found' /tmp/jftrade-linux-ldd.txt

      - name: Upload Linux desktop smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-desktop-linux-x64-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/desktop/linux-amd64/jftrade-desktop-linux-amd64
          if-no-files-found: error
          retention-days: 1

  desktop-build:
    name: Desktop Build (${{ matrix.label }})
    if: ${{ github.event_name == 'push' }}
    needs: [web, pine]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            test_tags: production,release_assets,gtk3
            build_script: desktop:build:linux
            artifact_id: linux-x64
            artifact_path: dist/desktop/linux-amd64/jftrade-desktop-linux-amd64
          - label: macOS ARM64
            runner: macos-15
            platform: macos
            test_tags: production,release_assets
            build_script: desktop:build:darwin-arm64
            artifact_id: macos-arm64
            artifact_path: dist/desktop/darwin-arm64/JFTrade.app
          - label: Windows x64
            runner: windows-latest
            platform: windows
            test_tags: production,release_assets
            build_script: desktop:build:windows
            artifact_id: windows-x64
            artifact_path: dist/desktop/windows-amd64/jftrade-desktop-windows-amd64.exe
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      JFTRADE_DESKTOP_PREPARED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download frontend build input
        uses: actions/download-artifact@v8
        with:
          name: ci-web-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/frontendassets

      - name: Download PineTS worker build input
        uses: actions/download-artifact@v8
        with:
          name: ci-pine-assets-${{ github.run_id }}-${{ github.run_attempt }}
          path: internal/pineworkerassets/assets/bin

      - name: Install Linux desktop dependencies
        if: ${{ matrix.platform == 'linux' }}
        run: bash scripts/install-linux-desktop-dependencies.sh

      - name: Verify macOS ARM64 runner
        if: ${{ matrix.platform == 'macos' }}
        run: test "$(uname -m)" = "arm64"

      - name: Verify Windows x64 runner
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          if ((go env GOARCH) -ne "amd64") {
            throw "Windows x64 runner is required"
          }

      - name: Generate OpenAPI build input
        run: pnpm run generate:openapi

      - name: Test desktop release profile
        run: go test -tags "${{ matrix.test_tags }}" ./cmd/jftrade-desktop ./internal/desktop -count=1

      - name: Build desktop application
        run: pnpm run ${{ matrix.build_script }}

      - name: Verify Linux desktop binary
        if: ${{ matrix.platform == 'linux' }}
        run: |
          artifact="dist/desktop/linux-amd64/jftrade-desktop-linux-amd64"
          test -x "$artifact"
          file "$artifact" | grep -q 'ELF 64-bit'
          go version -m "$artifact" | tee /tmp/jftrade-linux-buildinfo.txt
          grep -q 'github.com/jftrade/jftrade-main/cmd/jftrade-desktop' /tmp/jftrade-linux-buildinfo.txt
          ldd "$artifact" | tee /tmp/jftrade-linux-ldd.txt
          ! grep -q 'not found' /tmp/jftrade-linux-ldd.txt

      - name: Verify macOS desktop application
        if: ${{ matrix.platform == 'macos' }}
        run: |
          bundle="dist/desktop/darwin-arm64/JFTrade.app"
          binary="$bundle/Contents/MacOS/JFTrade"
          plist="$bundle/Contents/Info.plist"
          test -d "$bundle"
          test -x "$binary"
          plutil -lint "$plist"
          file "$binary" | grep -q 'Mach-O 64-bit executable arm64'
          test "$(lipo -archs "$binary")" = "arm64"
          go version -m "$binary" | tee /tmp/jftrade-macos-buildinfo.txt
          grep -q 'github.com/jftrade/jftrade-main/cmd/jftrade-desktop' /tmp/jftrade-macos-buildinfo.txt
          grep -q 'GOARCH=arm64' /tmp/jftrade-macos-buildinfo.txt
          strings "$binary" > /tmp/jftrade-macos-strings.txt
          grep -q '"Debug":false' /tmp/jftrade-macos-strings.txt
          codesign --verify --deep --strict --verbose=2 "$bundle"

      - name: Verify Windows desktop executable
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $artifact = (Resolve-Path "dist/desktop/windows-amd64/jftrade-desktop-windows-amd64.exe").Path
          if ((Get-Item $artifact).Length -le 0) {
            throw "Windows desktop executable is empty"
          }

          $stream = [System.IO.File]::OpenRead($artifact)
          $reader = [System.IO.BinaryReader]::new($stream)
          try {
            if ($reader.ReadUInt16() -ne 0x5A4D) {
              throw "Windows desktop executable is missing the MZ header"
            }
            $stream.Position = 0x3C
            $peOffset = $reader.ReadInt32()
            $stream.Position = $peOffset
            if ($reader.ReadUInt32() -ne 0x00004550) {
              throw "Windows desktop executable is missing the PE header"
            }
            if ($reader.ReadUInt16() -ne 0x8664) {
              throw "Windows desktop executable is not x64"
            }
            $stream.Position = $peOffset + 24 + 68
            if ($reader.ReadUInt16() -ne 2) {
              throw "Windows desktop executable is not using the Windows GUI subsystem"
            }
          } finally {
            $reader.Dispose()
            $stream.Dispose()
          }

          $buildInfo = & go version -m $artifact
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to read Windows desktop Go build metadata"
          }
          $buildInfo | Out-Host
          if (-not ($buildInfo -match "github.com/jftrade/jftrade-main/cmd/jftrade-desktop")) {
            throw "Windows desktop executable has unexpected Go module metadata"
          }
          if (-not ($buildInfo -match "GOARCH=amd64")) {
            throw "Windows desktop executable has unexpected Go architecture metadata"
          }

      - name: Upload desktop build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-desktop-${{ matrix.artifact_id }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 1

  build-and-test:
    name: Build & Test
    if: ${{ always() }}
    needs: [go-quality, proto-generation, go-coverage, web, pine, desktop-linux-smoke, desktop-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all CI lanes
        env:
          GO_QUALITY_RESULT: ${{ needs.go-quality.result }}
          PROTO_GENERATION_RESULT: ${{ needs.proto-generation.result }}
          GO_COVERAGE_RESULT: ${{ needs.go-coverage.result }}
          WEB_RESULT: ${{ needs.web.result }}
          PINE_RESULT: ${{ needs.pine.result }}
          DESKTOP_LINUX_SMOKE_RESULT: ${{ needs.desktop-linux-smoke.result }}
          DESKTOP_BUILD_RESULT: ${{ needs.desktop-build.result }}
        run: |
          if [[ "$GO_QUALITY_RESULT" != "success" || "$PROTO_GENERATION_RESULT" != "success" || "$GO_COVERAGE_RESULT" != "success" || "$WEB_RESULT" != "success" || "$PINE_RESULT" != "success" || ( "$DESKTOP_LINUX_SMOKE_RESULT" != "success" && "$DESKTOP_LINUX_SMOKE_RESULT" != "skipped" ) || ( "$DESKTOP_BUILD_RESULT" != "success" && "$DESKTOP_BUILD_RESULT" != "skipped" ) ]]; then
            echo "Go Quality & Contracts: $GO_QUALITY_RESULT"
            echo "Proto Generation: $PROTO_GENERATION_RESULT"
            echo "Go Coverage: $GO_COVERAGE_RESULT"
            echo "Web: $WEB_RESULT"
            echo "Pine & Workers: $PINE_RESULT"
            echo "Desktop Linux Smoke: $DESKTOP_LINUX_SMOKE_RESULT"
            echo "Desktop Build Matrix: $DESKTOP_BUILD_RESULT"
            exit 1
          fi
