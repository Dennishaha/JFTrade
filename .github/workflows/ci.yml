name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install CI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install frontend dependencies
        run: npm install

      - name: Generate API docs
        run: |
          npm run generate:docs

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          args: --timeout=5m

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -timeout 300s

      - name: Build binaries
        run: go build ./cmd/jftrade-api/

      - name: Frontend test
        run: npm run test:web

      - name: Frontend typecheck
        run: npm run typecheck:web

      - name: PineTS worker test
        run: npm run test:pineworker

      - name: PineTS worker typecheck
        run: npm run typecheck:pineworker

      - name: Frontend embedded asset build
        run: npm run build:frontend-assets

      - name: Frontend release asset test
        run: go test -tags release_assets ./internal/frontendassets -run TestFileSystem

      - name: PineTS release check script test
        run: npm run test:pinets-release-check

      - name: Architecture dependency check
        run: bash scripts/check-arch-deps.sh
