name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-and-contracts:
    name: Go & Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOFLAGS: "-tags=gtk3"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install CI tools
        run: |
          sudo apt-get update
          # Wails doctor probes the default GTK4/WebKitGTK 6.0 stack. The
          # project Linux release gate still builds the legacy GTK3 path.
          sudo apt-get install -y \
            pkg-config \
            ripgrep \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install revive
        run: |
          go install github.com/mgechev/revive@v1.15.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Wails doctor
        run: npm run desktop:doctor

      - name: Generate runtime contracts
        run: |
          npm run generate:openapi
          go run ./cmd/generate-pine-spec-docs -out docs/reference/generated
          git diff --exit-code -- docs/reference/generated/pine-v6-support.md

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          args: --timeout=5m --build-tags=gtk3

      - name: Go production file length gate
        shell: bash
        run: |
          set -euo pipefail
          list_file="$(mktemp)"
          trap 'rm -f "$list_file"' EXIT
          find cmd internal pkg -type f -name '*.go' ! -name '*_test.go' -print0 >"$list_file" 2>/dev/null

          files=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.pb.go|*/pb/*)
                continue
                ;;
            esac

            first_line="$(sed -n '1p' "$file")"
            if [[ "$first_line" =~ ^//[[:space:]]Code[[:space:]]generated.*DO[[:space:]]NOT[[:space:]]EDIT\.?$ ]]; then
              continue
            fi

            files+=("$file")
          done <"$list_file"

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No production Go files matched revive gate."
            exit 0
          fi

          revive -config .revive-file-length-prod.toml -set_exit_status "${files[@]}"

      - name: Go test file length gate
        shell: bash
        run: |
          set -euo pipefail
          list_file="$(mktemp)"
          trap 'rm -f "$list_file"' EXIT
          find cmd internal pkg -type f -name '*_test.go' -print0 >"$list_file" 2>/dev/null

          files=()
          while IFS= read -r -d '' file; do
            case "$file" in
              *.pb.go|*/pb/*)
                continue
                ;;
            esac

            first_line="$(sed -n '1p' "$file")"
            if [[ "$first_line" =~ ^//[[:space:]]Code[[:space:]]generated.*DO[[:space:]]NOT[[:space:]]EDIT\.?$ ]]; then
              continue
            fi

            files+=("$file")
          done <"$list_file"

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No test Go files matched revive gate."
            exit 0
          fi

          revive -config .revive-file-length-test.toml -set_exit_status "${files[@]}"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Go coverage gate
        run: npm run test:coverage:go

      - name: Wails bindings are current
        run: npm run check:wails-bindings

      - name: PineTS shadow corpus report
        env:
          JFTRADE_PINETS_SHADOW_REPORT_PATH: ${{ github.workspace }}/artifacts/pinets-shadow/report.json
        run: |
          mkdir -p artifacts/pinets-shadow
          npm run test:pinets-shadow-corpus

      - name: Upload PineTS shadow corpus report
        if: ${{ always() && hashFiles('artifacts/pinets-shadow/report.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: pinets-shadow-corpus-${{ github.run_id }}
          path: artifacts/pinets-shadow/report.json
          if-no-files-found: warn

      - name: Architecture dependency check
        run: bash scripts/check-arch-deps.sh

  web-and-pine:
    name: Web & Pine
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use declared npm version
        run: npm install --global npm@10.9.7 --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Frontend test
        run: npm run test:web:ci

      - name: Frontend typecheck
        run: npm run typecheck:web

      - name: PineTS worker test
        run: npm run test:pineworker

      - name: PineTS worker typecheck
        run: npm run typecheck:pineworker

      - name: Frontend embedded asset build
        run: npm run build:frontend-assets

      - name: Frontend release asset test
        run: go test -tags release_assets ./internal/frontendassets -run TestFileSystem

      - name: Desktop release script tests
        run: |
          npm run test:desktop-release-metadata
          npm run test:desktop-release-inputs
          npm run test:desktop-mac-bundle
          npm run test:desktop-windows-resource-metadata
          node scripts/dev-desktop.test.mjs

      - name: PineTS release check script test
        run: npm run test:pinets-release-check

      - name: PineTS compliance notice check
        run: npm run check:pinets-compliance

      - name: PineTS worker asset build script test
        run: npm run test:pineworker-asset-build

  build-and-test:
    name: Build & Test
    if: ${{ always() }}
    needs: [go-and-contracts, web-and-pine]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all CI lanes
        env:
          GO_RESULT: ${{ needs.go-and-contracts.result }}
          WEB_RESULT: ${{ needs.web-and-pine.result }}
        run: |
          if [[ "$GO_RESULT" != "success" || "$WEB_RESULT" != "success" ]]; then
            echo "Go & Contracts: $GO_RESULT"
            echo "Web & Pine: $WEB_RESULT"
            exit 1
          fi
