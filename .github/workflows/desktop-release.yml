name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  desktop:
    name: Desktop ${{ matrix.release }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin
            release: darwin-amd64
            arch: amd64
            os: macos-latest
            artifact: JFTrade.app
          - target: windows
            release: windows-amd64
            arch: amd64
            os: windows-latest
            artifact: jftrade-desktop-windows-amd64.exe
          - target: linux
            release: linux-amd64
            arch: amd64
            os: ubuntu-24.04
            artifact: jftrade-desktop-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop artifact
        run: npm run desktop:release:${{ matrix.target }}
        env:
          GOARCH: ${{ matrix.arch }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: jftrade-desktop-${{ matrix.release }}-${{ github.run_id }}
          path: dist/desktop-release/${{ matrix.release }}/${{ matrix.artifact }}
          if-no-files-found: error
