name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref/SHA for a dry run, or an exact vX.Y.Z tag to publish
        required: true
        default: main
        type: string
      dry_run:
        description: Build and verify artifacts without attesting or publishing a GitHub Release
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions: {}

env:
  JFTRADE_DESKTOP_BUILD_REF: ${{ github.event_name == 'push' && github.ref_name || inputs.release_ref }}
  JFTRADE_DESKTOP_RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || (inputs.dry_run && format('v0.0.{0}', github.run_number) || inputs.release_ref) }}
  JFTRADE_DESKTOP_PUBLISH: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true) }}
  JFTRADE_DESKTOP_BUILD_TIME: ${{ github.event.head_commit.timestamp || '' }}

concurrency:
  group: desktop-release-${{ github.event_name == 'push' && github.ref_name || inputs.release_ref }}
  cancel-in-progress: false

jobs:
  release-inputs:
    name: Prepare Release Inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v7
        with:
          ref: ${{ env.JFTRADE_DESKTOP_BUILD_REF }}
          fetch-depth: 0

      - name: Verify release policy
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          head_commit="$(git rev-parse HEAD)"
          if [[ "$JFTRADE_DESKTOP_PUBLISH" != "true" ]]; then
            echo "Dry run will build $JFTRADE_DESKTOP_BUILD_REF at $head_commit as $JFTRADE_DESKTOP_RELEASE_TAG."
            exit 0
          fi
          if [[ ! "$JFTRADE_DESKTOP_RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || [[ "$JFTRADE_DESKTOP_RELEASE_TAG" = "v0.0.0" ]]; then
            echo "Invalid release tag: $JFTRADE_DESKTOP_RELEASE_TAG" >&2
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$JFTRADE_DESKTOP_RELEASE_TAG"; then
            echo "Publishing requires an existing tag: $JFTRADE_DESKTOP_RELEASE_TAG" >&2
            exit 1
          fi
          tag_commit="$(git rev-parse "refs/tags/$JFTRADE_DESKTOP_RELEASE_TAG^{commit}")"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            echo "Checked out $head_commit, expected tag commit $tag_commit" >&2
            exit 1
          fi
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main; then
            echo "Release tag $JFTRADE_DESKTOP_RELEASE_TAG does not belong to main" >&2
            exit 1
          fi
          ci_url="$(
            gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f head_sha="$tag_commit" \
              -f branch=main \
              -f event=push \
              -f status=success \
              -F per_page=100 \
              --jq '.workflow_runs[0].html_url // ""'
          )"
          if [[ -z "$ci_url" ]]; then
            echo "No successful main CI run found for $tag_commit" >&2
            exit 1
          fi
          echo "Verified required CI run: $ci_url"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux desktop dependencies
        run: bash scripts/install-linux-desktop-dependencies.sh

      - name: Use declared npm version
        run: npm install --global npm@10.9.7 --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit locked npm dependencies
        run: npm run audit:dependencies

      - name: Verify Wails host
        env:
          GOFLAGS: "-tags=gtk3"
        run: npm run desktop:doctor

      - name: Generate release inputs
        run: |
          npm run generate:docs
          npm run build:frontend-assets
          npm run build:pineworker
          git diff --exit-code -- docs/reference/generated/pine-v6-support.md

      - name: Verify PineTS release acceptance
        run: npm run check:pinets-release

      - name: Verify shared desktop source
        env:
          GOFLAGS: "-tags=gtk3"
        run: |
          npm run check:wails-bindings
          npm run typecheck:web
          npm run test:desktop-release-metadata
          npm run test:desktop-release-inputs
          npm run test:desktop-wails-tasks
          npm run test:desktop-signing
          npm run test:desktop-linux-package-config
          node scripts/dev-desktop.test.mjs

      - name: Verify embedded release inputs
        run: go test -tags release_assets ./internal/frontendassets ./internal/pineworkerassets -count=1

      - name: Upload prepared release inputs
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-inputs-${{ github.run_id }}
          path: |
            docs/swagger/docs.go
            docs/swagger/swagger.json
            docs/swagger/swagger.yaml
            internal/frontendassets/dist.zip
            internal/pineworkerassets/assets/bin/worker.mjs
          if-no-files-found: error
          retention-days: 1

  macos:
    name: macOS ARM64 DMG
    needs: release-inputs
    runs-on: macos-15
    timeout-minutes: 40
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      JFTRADE_DESKTOP_PREPARED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.JFTRADE_DESKTOP_BUILD_REF }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Download prepared release inputs
        uses: actions/download-artifact@v8
        with:
          name: desktop-build-inputs-${{ github.run_id }}
          path: .

      - name: Verify ARM64 runner
        run: test "$(uname -m)" = "arm64"

      - name: Test macOS desktop package
        run: go test -tags production,release_assets ./cmd/jftrade-desktop ./internal/desktop -count=1

      - name: Configure macOS signing and notarization
        env:
          CERTIFICATE_BASE64: ${{ secrets.JFTRADE_MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.JFTRADE_MACOS_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.JFTRADE_MACOS_SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.JFTRADE_MACOS_NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.JFTRADE_MACOS_NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.JFTRADE_MACOS_NOTARY_TEAM_ID }}
        run: |
          values=("$CERTIFICATE_BASE64" "$CERTIFICATE_PASSWORD" "$SIGN_IDENTITY" "$NOTARY_APPLE_ID" "$NOTARY_PASSWORD" "$NOTARY_TEAM_ID")
          configured=0
          for value in "${values[@]}"; do test -n "$value" && configured=$((configured + 1)); done
          if [ "$configured" -eq 0 ]; then
            echo "Signing credentials are not configured; producing an unsigned macOS release with an ad-hoc signature."
            exit 0
          fi
          if [ "$configured" -ne "${#values[@]}" ]; then echo "macOS signing secrets must be all set or all unset" >&2; exit 1; fi
          keychain="$RUNNER_TEMP/jftrade-signing.keychain-db"
          certificate="$RUNNER_TEMP/jftrade-signing.p12"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          xcrun notarytool store-credentials jftrade-ci --apple-id "$NOTARY_APPLE_ID" --password "$NOTARY_PASSWORD" --team-id "$NOTARY_TEAM_ID"
          echo "JFTRADE_MACOS_SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "JFTRADE_MACOS_NOTARY_PROFILE=jftrade-ci" >> "$GITHUB_ENV"

      - name: Build ARM64 DMG
        run: npm run desktop:release:darwin

      - name: Locate macOS artifact
        id: artifact
        run: |
          artifact="$(find dist/desktop-release/darwin-arm64 -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$artifact"
          echo "path=$artifact" >> "$GITHUB_OUTPUT"

      - name: Verify sealed macOS bundle
        run: |
          bundle="dist/desktop-release/darwin-arm64/JFTrade.app"
          codesign --verify --deep --strict --verbose=2 "$bundle"
          test "$(lipo -archs "$bundle/Contents/MacOS/JFTrade")" = "arm64"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$bundle/Contents/Info.plist")" = "com.jftrade.desktop"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$bundle/Contents/Info.plist")" = "${JFTRADE_DESKTOP_RELEASE_TAG#v}"
          bash build/darwin/verify-dmg.sh "${{ steps.artifact.outputs.path }}"

      - name: Generate macOS SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/desktop-release/darwin-arm64/JFTrade.app
          format: spdx-json
          output-file: dist/desktop-release/JFTrade-macos-arm64.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest macOS build provenance
        if: ${{ github.event.repository.private == false && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifact.outputs.path }}

      - name: Upload macOS release files
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-macos
          path: |
            ${{ steps.artifact.outputs.path }}
            dist/desktop-release/JFTrade-macos-arm64.spdx.json
          if-no-files-found: error

  windows:
    name: Windows x64 Installer
    needs: release-inputs
    runs-on: windows-latest
    timeout-minutes: 35
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      JFTRADE_DESKTOP_PREPARED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.JFTRADE_DESKTOP_BUILD_REF }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Download prepared release inputs
        uses: actions/download-artifact@v8
        with:
          name: desktop-build-inputs-${{ github.run_id }}
          path: .

      - name: Install packaging tools
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $makensis = Join-Path ${env:ProgramFiles(x86)} "NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { throw "NSIS compiler was not installed: $makensis" }
          "MAKENSIS=$makensis" | Out-File -FilePath $env:GITHUB_ENV -Append
          (Split-Path $makensis) | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure Windows signing
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.JFTRADE_WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.JFTRADE_WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $configured = @($env:CERTIFICATE_BASE64, $env:CERTIFICATE_PASSWORD) | Where-Object { $_ }
          if ($configured.Count -eq 0) {
            Write-Host "Authenticode credentials are not configured; producing an unsigned Windows installer."
            exit 0
          }
          if ($configured.Count -ne 2) { throw "Windows signing secrets must be all set or all unset" }
          $certificate = Join-Path $env:RUNNER_TEMP "jftrade-signing.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
          "JFTRADE_WINDOWS_CERTIFICATE=$certificate" | Out-File -FilePath $env:GITHUB_ENV -Append
          "JFTRADE_WINDOWS_CERTIFICATE_PASSWORD=$env:CERTIFICATE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Test Windows desktop package
        run: go test -tags production,release_assets ./cmd/jftrade-desktop ./internal/desktop -count=1

      - name: Build per-user NSIS installer
        run: npm run desktop:release:windows

      - name: Locate Windows artifact
        id: artifact
        shell: pwsh
        run: |
          $artifact = Get-ChildItem dist/desktop-release/windows-amd64/*-setup.exe | Select-Object -First 1
          if (-not $artifact) { throw "Windows installer was not produced" }
          "path=$($artifact.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate Windows SBOM
        uses: anchore/sbom-action@v0
        with:
          file: dist/desktop/windows-amd64/jftrade-desktop-windows-amd64.exe
          format: spdx-json
          output-file: dist/desktop-release/JFTrade-windows-x64.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest Windows build provenance
        if: ${{ github.event.repository.private == false && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifact.outputs.path }}

      - name: Upload Windows release files
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-windows
          path: |
            ${{ steps.artifact.outputs.path }}
            dist/desktop-release/JFTrade-windows-x64.spdx.json
          if-no-files-found: error

  windows_arm64:
    name: Windows ARM64 Preview Installer
    needs: release-inputs
    runs-on: windows-11-arm
    timeout-minutes: 35
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      JFTRADE_DESKTOP_PREPARED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.JFTRADE_DESKTOP_BUILD_REF }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Download prepared release inputs
        uses: actions/download-artifact@v8
        with:
          name: desktop-build-inputs-${{ github.run_id }}
          path: .

      - name: Verify ARM64 runner
        shell: pwsh
        run: |
          if ((go env GOARCH) -ne "arm64") { throw "Windows ARM64 runner is required" }

      - name: Install packaging tools
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $makensis = Join-Path ${env:ProgramFiles(x86)} "NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { throw "NSIS compiler was not installed: $makensis" }
          "MAKENSIS=$makensis" | Out-File -FilePath $env:GITHUB_ENV -Append
          (Split-Path $makensis) | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure Windows signing
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.JFTRADE_WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.JFTRADE_WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $configured = @($env:CERTIFICATE_BASE64, $env:CERTIFICATE_PASSWORD) | Where-Object { $_ }
          if ($configured.Count -eq 0) {
            Write-Host "Authenticode credentials are not configured; producing an unsigned Windows installer."
            exit 0
          }
          if ($configured.Count -ne 2) { throw "Windows signing secrets must be all set or all unset" }
          $certificate = Join-Path $env:RUNNER_TEMP "jftrade-signing.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
          "JFTRADE_WINDOWS_CERTIFICATE=$certificate" | Out-File -FilePath $env:GITHUB_ENV -Append
          "JFTRADE_WINDOWS_CERTIFICATE_PASSWORD=$env:CERTIFICATE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Test Windows ARM64 desktop package
        run: go test -tags production,release_assets ./cmd/jftrade-desktop ./internal/desktop -count=1

      - name: Build ARM64 preview NSIS installer
        run: npm run desktop:release:windows-arm64

      - name: Locate Windows ARM64 artifact
        id: artifact
        shell: pwsh
        run: |
          $artifact = Get-ChildItem dist/desktop-release/windows-arm64/*-preview-*-setup.exe | Select-Object -First 1
          if (-not $artifact) { throw "Windows ARM64 preview installer was not produced" }
          "path=$($artifact.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate Windows ARM64 SBOM
        uses: anchore/sbom-action@v0
        with:
          file: ${{ steps.artifact.outputs.path }}
          format: spdx-json
          output-file: dist/desktop-release/JFTrade-windows-arm64.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest Windows ARM64 build provenance
        if: ${{ github.event.repository.private == false && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifact.outputs.path }}

      - name: Upload Windows ARM64 release files
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-windows-arm64
          path: |
            ${{ steps.artifact.outputs.path }}
            dist/desktop-release/JFTrade-windows-arm64.spdx.json
          if-no-files-found: error

  linux:
    name: Linux x64 Build
    needs: release-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      JFTRADE_DESKTOP_PREPARED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.JFTRADE_DESKTOP_BUILD_REF }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Download prepared release inputs
        uses: actions/download-artifact@v8
        with:
          name: desktop-build-inputs-${{ github.run_id }}
          path: .

      - name: Install Linux desktop dependencies
        run: bash scripts/install-linux-desktop-dependencies.sh

      - name: Test Linux release profile
        run: go test -tags production,release_assets,gtk3 ./cmd/jftrade-desktop ./internal/desktop -count=1

      - name: Build Linux x64 release binary
        run: npm run desktop:release:linux

      - name: Verify Linux x64 release binary
        id: artifact
        run: |
          artifact="dist/desktop-release/linux-amd64/jftrade-desktop-linux-amd64"
          test -x "$artifact"
          file "$artifact" | grep -q 'ELF 64-bit'
          go version -m "$artifact" | tee /tmp/jftrade-linux-buildinfo.txt
          grep -q 'github.com/jftrade/jftrade-main/cmd/jftrade-desktop' /tmp/jftrade-linux-buildinfo.txt
          ldd "$artifact" | tee /tmp/jftrade-linux-ldd.txt
          ! grep -q 'not found' /tmp/jftrade-linux-ldd.txt
          echo "path=$artifact" >> "$GITHUB_OUTPUT"
          appimage="$(find dist/desktop-release/linux-amd64 -maxdepth 1 -name '*.AppImage' -print -quit)"
          deb="$(find dist/desktop-release/linux-amd64 -maxdepth 1 -name '*.deb' -print -quit)"
          test -x "$appimage"
          test -s "$deb"
          "$appimage" --appimage-extract >/dev/null
          dpkg-deb --info "$deb" | tee /tmp/jftrade-deb-info.txt
          grep -q 'libgtk-3-0' /tmp/jftrade-deb-info.txt
          grep -q 'libwebkit2gtk-4.1-0' /tmp/jftrade-deb-info.txt

      - name: Generate Linux x64 SBOM
        uses: anchore/sbom-action@v0
        with:
          file: ${{ steps.artifact.outputs.path }}
          format: spdx-json
          output-file: dist/desktop-release/JFTrade-linux-x64.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest Linux x64 build provenance
        if: ${{ github.event.repository.private == false && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/desktop-release/linux-amd64/jftrade-desktop-linux-amd64
            dist/desktop-release/linux-amd64/*.AppImage
            dist/desktop-release/linux-amd64/*.deb

      - name: Upload Linux x64 release files
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-linux
          path: |
            dist/desktop-release/linux-amd64/jftrade-desktop-linux-amd64
            dist/desktop-release/linux-amd64/*.AppImage
            dist/desktop-release/linux-amd64/*.deb
            dist/desktop-release/JFTrade-linux-x64.spdx.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: >-
      always() &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true)) &&
      needs.macos.result == 'success' &&
      needs.windows.result == 'success' &&
      needs.windows_arm64.result == 'success' &&
      needs.linux.result == 'success'
    needs: [macos, windows, windows_arm64, linux]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-release-*
          merge-multiple: true
          path: incoming

      - name: Flatten release files
        run: |
          mkdir release
          find incoming -type f -exec cp {} release/ \;
          # Linux contributes a raw binary, AppImage, deb and SBOM; other platforms contribute installer and SBOM.
          test "$(find release -maxdepth 1 -type f | wc -l)" -ge 8

      - name: Generate SHA256SUMS
        working-directory: release
        run: |
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Attest checksum manifest
        if: github.event.repository.private == false
        uses: actions/attest@v4
        with:
          subject-path: release/SHA256SUMS

      - name: Upload assets and publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$JFTRADE_DESKTOP_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft="$(gh release view "$JFTRADE_DESKTOP_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"
            gh release upload "$JFTRADE_DESKTOP_RELEASE_TAG" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            is_draft="true"
            gh release create "$JFTRADE_DESKTOP_RELEASE_TAG" release/* --draft --verify-tag --generate-notes --title "JFTrade ${JFTRADE_DESKTOP_RELEASE_TAG#v}" --repo "$GITHUB_REPOSITORY"
          fi
          if [ "$is_draft" = "true" ]; then
            gh release edit "$JFTRADE_DESKTOP_RELEASE_TAG" --draft=false --repo "$GITHUB_REPOSITORY"
          fi
