version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - funlen
    - revive
  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - funlen
  settings:
    funlen:
      lines: 80
      statements: 60
    revive:
      enable-default-rules: false
      rules:
        - name: filename-format
          arguments:
            - '^(?:[A-Za-z0-9-]+(?:_[A-Za-z0-9-]+){0,2}\.go|[A-Za-z0-9-]+(?:_[A-Za-z0-9-]+){0,3}_test\.go)$'
