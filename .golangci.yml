version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - depguard
    - govet
  settings:
    depguard:
      rules:
        api-transport-boundary:
          files:
            - internal/api/**/*.go
            - "!internal/api/**/*_test.go"
          deny:
            - pkg: github.com/jftrade/jftrade-main/internal/store
              desc: API transport must call services instead of stores.
            - pkg: github.com/jftrade/jftrade-main/internal/integration
              desc: API transport must not call concrete integrations.
            - pkg: github.com/jftrade/jftrade-main/pkg/futu
              desc: API transport must stay Futu-protocol free.
            - pkg: google.golang.org/protobuf
              desc: API transport must stay protobuf free.
            - pkg: database/sql
              desc: API transport must not access databases directly.
            - pkg: github.com/jmoiron/sqlx
              desc: API transport must not access databases directly.
            - pkg: gorm.io/gorm
              desc: API transport must not access databases directly.
            - pkg: modernc.org/sqlite
              desc: API transport must not access databases directly.
        business-service-boundary:
          files:
            - internal/system/**/*.go
            - internal/settings/**/*.go
            - internal/marketdata/**/*.go
            - internal/trading/**/*.go
            - internal/strategy/**/*.go
            - internal/backtest/**/*.go
            - internal/assistant/**/*.go
            - "!**/*_test.go"
          deny:
            - pkg: github.com/gin-gonic/gin
              desc: Business services must not depend on Gin.
            - pkg: github.com/jftrade/jftrade-main/internal/api
              desc: Business services must not depend on transport packages.
            - pkg: database/sql
              desc: Business services must use repository/provider interfaces.
            - pkg: github.com/jmoiron/sqlx
              desc: Business services must use repository/provider interfaces.
            - pkg: gorm.io/gorm
              desc: Business services must use repository/provider interfaces.
            - pkg: modernc.org/sqlite
              desc: Business services must use repository/provider interfaces.
            - pkg: google.golang.org/protobuf
              desc: Business services must not expose protobuf protocol types.
        store-boundary:
          files:
            - internal/store/**/*.go
            - "!internal/store/**/*_test.go"
          deny:
            - pkg: github.com/gin-gonic/gin
              desc: Stores must not depend on HTTP transport.
            - pkg: github.com/jftrade/jftrade-main/internal/api
              desc: Stores must not depend on HTTP transport.
            - pkg: github.com/jftrade/jftrade-main/internal/integration
              desc: Stores must not call concrete integrations.
            - pkg: github.com/jftrade/jftrade-main/pkg/futu
              desc: Stores must not call broker SDKs.
        integration-boundary:
          files:
            - internal/integration/**/*.go
            - "!internal/integration/**/*_test.go"
          deny:
            - pkg: github.com/jftrade/jftrade-main/internal/api
              desc: Integration adapters must not depend on API transport.
