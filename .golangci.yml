version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - revive
  exclusions:
    generated: strict
  settings:
    revive:
      enable-default-rules: false
      rules:
        - name: filename-format
          arguments:
            - '^(?:[A-Za-z0-9-]+(?:_[A-Za-z0-9-]+){0,2}\.go|[A-Za-z0-9-]+(?:_[A-Za-z0-9-]+){0,3}_test\.go)$'
