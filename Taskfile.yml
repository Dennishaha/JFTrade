version: "3"

includes:
  common: ./build/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

tasks:
  build:
    desc: Standard Wails build entrypoint for the current platform
    cmds:
      - node scripts/build-desktop.mjs

  package:
    desc: Standard Wails package entrypoint for the current platform
    cmds:
      - node scripts/release-desktop.mjs

  dev:
    desc: Standard Wails development entrypoint
    cmds:
      - node scripts/dev-desktop.mjs

  desktop:dev:
    desc: Run the Wails v3 desktop app with the Vue dev server
    cmds:
      - node scripts/dev-desktop.mjs

  desktop:doctor:
    desc: Verify the pinned Wails v3 CLI and host desktop prerequisites
    cmds:
      - pnpm run desktop:doctor

  desktop:build:
    desc: Build the Wails v3 desktop artifact for the current platform
    cmds:
      - node scripts/build-desktop.mjs

  desktop:build:darwin-arm64:
    cmds: [node scripts/build-desktop.mjs darwin-arm64]
  desktop:build:windows:
    cmds: [node scripts/build-desktop.mjs windows-amd64]
  desktop:build:windows-arm64:
    cmds: [node scripts/build-desktop.mjs windows-arm64]
  desktop:build:linux:
    cmds: [node scripts/build-desktop.mjs linux-amd64]

  desktop:release:
    cmds: [node scripts/release-desktop.mjs]
  desktop:release:darwin:
    cmds: [node scripts/release-desktop.mjs darwin-arm64]
  desktop:release:windows:
    cmds: [node scripts/release-desktop.mjs windows-amd64]
  desktop:release:windows-arm64:
    cmds: [node scripts/release-desktop.mjs windows-arm64]
  desktop:release:linux:
    cmds: [node scripts/release-desktop.mjs linux-amd64]

  desktop:package:windows-msix:
    cmds: [node scripts/release-desktop.mjs windows-amd64 msix]
  desktop:package:linux-appimage:
    cmds: [node scripts/release-desktop.mjs linux-amd64 appimage]
  desktop:package:linux-deb:
    cmds: [node scripts/release-desktop.mjs linux-amd64 deb]
  desktop:package:linux-rpm:
    cmds: [node scripts/release-desktop.mjs linux-amd64 rpm]
  desktop:package:linux-arch:
    cmds: [node scripts/release-desktop.mjs linux-amd64 archlinux]
