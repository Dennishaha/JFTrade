syntax = "proto3";

package jftrade.strategy.pineworker.v1;

option go_package = "github.com/jftrade/jftrade-main/pkg/strategy/pineworker/pineworkerpb;pineworkerpb";

message CandleBatch {
  uint32 encoding_version = 1;
  bytes payload = 2;
}

message Diagnostic {
  string severity = 1;
  string code = 2;
  string message = 3;
  int32 line = 4;
  int32 column = 5;
}

message PlotOutput {
  string name = 1;
  repeated double values = 2;
}

message AlertEvent {
  string type = 1;
  string id = 2;
  string message = 3;
  string title = 4;
  string frequency = 5;
  int32 bar_index = 6;
  int64 time = 7;
}

message VisualOutput {
  string kind = 1;
  string name = 2;
  string payload_json = 3;
}

message StrategyMetrics {
  double buy_and_hold_pnl = 1;
  double buy_and_hold_per_gain = 2;
  double strategy_outperformance = 3;
  bool has_buy_and_hold_pnl = 4;
  bool has_buy_and_hold_per_gain = 5;
  bool has_strategy_outperformance = 6;
}

message OrderIntent {
  string kind = 1;
  string id = 2;
  string from_entry = 3;
  string direction = 4;
  double quantity = 5;
  double quantity_pct = 6;
  double limit_price = 7;
  double stop_price = 8;
  string comment = 9;
  string alert_message = 10;
  bool disable_alert = 11;
  int32 bar_index = 12;
  int64 time = 13;
  bool has_quantity = 14;
  bool has_quantity_pct = 15;
  bool has_limit_price = 16;
  bool has_stop_price = 17;
  // parent_id links a protective child to the logical Pine entry order.
  string parent_id = 18;
  // atomic_group_id requires every placement in the group to be accepted as
  // one unit. Executors without that capability must reject the whole group.
  string atomic_group_id = 19;
  // oco_group_id identifies mutually exclusive protective legs.
  string oco_group_id = 20;
  // reduce_only prevents an exit from increasing or reversing exposure.
  bool reduce_only = 21;
}

message WorkerMetadata {
  string worker_id = 1;
  string version = 2;
  string pinets_version = 3;
  string script_hash = 4;
  string data_hash = 5;
  int64 duration_ms = 6;
  int32 request_bytes = 7;
  int32 response_bytes = 8;
  int64 peak_rss_bytes = 9;
}
