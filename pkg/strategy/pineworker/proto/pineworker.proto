syntax = "proto3";

package jftrade.strategy.pineworker.v1;

option go_package = "github.com/jftrade/jftrade-main/pkg/strategy/pineworker/pineworkerpb;pineworkerpb";

service PineWorker {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc AnalyzeScript(AnalyzeScriptRequest) returns (AnalyzeScriptResponse);
  rpc RunScript(RunScriptRequest) returns (RunScriptResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool ok = 1;
  string worker_id = 2;
  string version = 3;
  string pinets_version = 4;
  repeated string capabilities = 5;
}

message AnalyzeScriptRequest {
  string job_id = 1;
  string script_id = 2;
  string source = 3;
  map<string, string> params = 4;
}

message AnalyzeScriptResponse {
  string job_id = 1;
  bool ok = 2;
  repeated Diagnostic diagnostics = 3;
  repeated string inputs = 4;
  repeated string plots = 5;
  map<string, string> strategy_config = 6;
  WorkerMetadata metadata = 7;
  string error = 8;
}

message RunScriptRequest {
  string job_id = 1;
  string script_id = 2;
  string source = 3;
  string symbol = 4;
  string timeframe = 5;
  string mode = 6;
  repeated Candle candles = 7;
  map<string, string> params = 8;
}

message RunScriptResponse {
  string job_id = 1;
  repeated SeriesOutput outputs = 2;
  repeated PlotOutput plots = 3;
  repeated OrderIntent order_intents = 4;
  repeated string logs = 5;
  repeated string warnings = 6;
  repeated Diagnostic diagnostics = 7;
  WorkerMetadata metadata = 8;
  string error = 9;
}

message Candle {
  int64 open_time = 1;
  int64 close_time = 2;
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  double volume = 7;
}

message Diagnostic {
  string severity = 1;
  string code = 2;
  string message = 3;
  int32 line = 4;
  int32 column = 5;
}

message SeriesOutput {
  string name = 1;
  string kind = 2;
  repeated double values = 3;
}

message PlotOutput {
  string name = 1;
  repeated double values = 2;
}

message OrderIntent {
  string kind = 1;
  string id = 2;
  string from_entry = 3;
  string direction = 4;
  double quantity = 5;
  double quantity_pct = 6;
  double limit_price = 7;
  double stop_price = 8;
  string comment = 9;
  string alert_message = 10;
  bool disable_alert = 11;
  int32 bar_index = 12;
  int64 time = 13;
  bool has_quantity = 14;
  bool has_quantity_pct = 15;
  bool has_limit_price = 16;
  bool has_stop_price = 17;
}

message WorkerMetadata {
  string worker_id = 1;
  string version = 2;
  string pinets_version = 3;
  string script_hash = 4;
  string data_hash = 5;
  int64 duration_ms = 6;
  int32 request_bytes = 7;
  int32 response_bytes = 8;
  int64 peak_rss_bytes = 9;
}
