syntax = "proto2";
package Qot_GetEventContractComboList;
option java_package = "com.futu.openapi.pb";
option go_package = "github.com/jftrade/jftrade-main/pkg/futu/pb/qotgeteventcontractcombolist;qotgeteventcontractcombolist";

import "Qot_Common.proto";

// 可 Combo 事件项
message ComboEvent {
    required Qot_Common.Security eventSecurity = 1;      // 事件标的 {market=101, code="EC.xxx"}
    optional string eventName = 2;                       // 事件名称（多语言）
    repeated Qot_Common.Security comboContracts = 3;     // 可组合的合约列表（contract 级预览，全量走 Qot_GetEventContract）
    optional Qot_Common.Security seriesSecurity = 4;     // 所属 Series
    optional string category = 5;                        // 一级分类标识
    optional string competition = 6;                     // 赛事名称（多语言）
    optional string competitionScope = 7;                // 赛事类型/玩法（多语言）
}

message C2S {
    optional string category = 1;                        // 一级分类过滤（如 "SPORTS"）
    optional string competition = 2;                     // 赛事过滤
    optional Qot_Common.Security series = 3;             // Series 标的过滤 {market=101, code="EC.xxx"}
    optional string nextPage = 4;                        // 翻页标记（首页不填）
    optional int32 count = 5;                            // 单页最大返回数（默认 200）
}

message S2C {
    repeated ComboEvent comboEventList = 1;              // 可 Combo 事件列表
    optional string mvc = 2;                             // MVC 标的，格式 exchange.origin_symbol（询价接口需透传）
    optional string nextPage = 3;                        // 为空表示没有下一页
}

message Request {
    required C2S c2s = 1;
}

message Response {
    required int32 retType = 1 [default = -400];
    optional string retMsg = 2;
    optional int32 errCode = 3;
    optional S2C s2c = 4;
}
