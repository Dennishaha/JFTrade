syntax = "proto2";
package Qot_UpdateEventContractKline;
option java_package = "com.futu.openapi.pb";
option go_package = "github.com/jftrade/jftrade-main/pkg/futu/pb/qotupdateeventcontractkline;qotupdateeventcontractkline";

import "Qot_GetEventContractKline.proto";

message S2C {
    repeated Qot_GetEventContractKline.KlineItem klineList = 1;  // K线列表
}

message Response {
    required int32 retType = 1 [default = -400];
    optional string retMsg = 2;
    optional int32 errCode = 3;
    optional S2C s2c = 4;
}
