syntax = "proto2";
package Trd_GetMaxTrdQtys;
option java_package = "com.futu.openapi.pb";
option go_package = "github.com/jftrade/jftrade-main/pkg/futu/pb/trdgetmaxtrdqtys;trdgetmaxtrdqtys";

import "Common.proto";
import "Trd_Common.proto";

message C2S
{
	required Trd_Common.TrdHeader header = 1; //交易公共参数头
	required int32 orderType = 2; //订单类型, 参见Trd_Common.OrderType的枚举定义
	required string code = 3; //代码，港股必须是5位数字，A股必须是6位数字，美股没限制
	required double price = 4; //价格，如果是竞价、市价单，请也填入一个当前价格，服务器才好计算
	optional uint64 orderID = 5; //订单号，新下订单不需要，改单时需要带上
	optional bool adjustPrice = 6; //是否调整价格，如果价格不合法，是否调整到合法价位
	optional double adjustSideAndLimit = 7; //调整方向和调整幅度百分比限制
	optional int32 secMarket = 8; //证券所属市场，参见Trd_Common.TrdSecMarket的枚举定义
	optional string orderIDEx = 9; //表示服务器订单id，可以用来代替orderID，和orderID二选一
	optional int32 session = 10; //美股订单时段, 参见Common.Session的枚举定义
	optional uint64 positionID = 11; //持仓ID，JP券商查询平仓数量时使用
}

message S2C
{
	required Trd_Common.TrdHeader header = 1; //交易公共参数头
	optional Trd_Common.MaxTrdQtys maxTrdQtys = 2; //最大可交易数量结构
}

message Request
{
	required C2S c2s = 1;
}

message Response
{
	//以下3个字段每条协议都有，注释说明在InitConnect.proto中
	required int32 retType = 1 [default = -400];
	optional string retMsg = 2;
	optional int32 errCode = 3;

	optional S2C s2c = 4;
}