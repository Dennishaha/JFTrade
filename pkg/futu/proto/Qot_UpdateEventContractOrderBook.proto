syntax = "proto2";
package Qot_UpdateEventContractOrderBook;
option java_package = "com.futu.openapi.pb";
option go_package = "github.com/jftrade/jftrade-main/pkg/futu/pb/qotupdateeventcontractorderbook;qotupdateeventcontractorderbook";

import "Qot_GetEventContractOrderBook.proto";

message S2C {
    repeated Qot_GetEventContractOrderBook.OrderBookItem orderBookList = 1;  // 摆盘列表
}

message Response {
    required int32 retType = 1 [default = -400];
    optional string retMsg = 2;
    optional int32 errCode = 3;
    optional S2C s2c = 4;
}
