syntax = "proto2";
package Qot_UpdateEventContractTicker;
option java_package = "com.futu.openapi.pb";
option go_package = "github.com/jftrade/jftrade-main/pkg/futu/pb/qotupdateeventcontractticker;qotupdateeventcontractticker";

import "Qot_GetEventContractTicker.proto";

message S2C {
    repeated Qot_GetEventContractTicker.TickerItem tickerList = 1;  // 逐笔列表
}

message Response {
    required int32 retType = 1 [default = -400];
    optional string retMsg = 2;
    optional int32 errCode = 3;
    optional S2C s2c = 4;
}
