syntax = "proto2";
package Qot_GetOrderBook;
option java_package = "com.futu.openapi.pb";
option go_package = "github.com/jftrade/jftrade-main/pkg/futu/pb/qotgetorderbook;qotgetorderbook";

import "Qot_Common.proto";

message C2S
{
	required Qot_Common.Security security = 1; //股票
	required int32 num = 2; //请求摆盘档数
}

message S2C
{
	required Qot_Common.Security security = 1; //股票
	optional string name = 2; //股票名称
	optional string svrRecvTimeBid = 3; //富途服务器从交易所收到买盘数据的时间
	optional string svrRecvTimeAsk = 4; //富途服务器从交易所收到卖盘数据的时间
	repeated Qot_Common.OrderBook orderBookAskList = 5; //卖盘
	repeated Qot_Common.OrderBook orderBookBidList = 6; //买盘
}

message Request
{
	required C2S c2s = 1;
}

message Response
{
	required int32 retType = 1 [default = -400]; //RetType,返回结果
	optional string retMsg = 2;
	optional int32 errCode = 3;
	
	optional S2C s2c = 4;
}
