      useEncryption:
        type: boolean
      websocketKey:
        type: string
      websocketPort:
        type: integer
    type: object
  jftradeapi.SecuritySettings:
    properties:
      adminAuthRequired:
        type: boolean
    type: object
  jftradeapi.UIAppearanceSettings:
    properties:
      downColor:
