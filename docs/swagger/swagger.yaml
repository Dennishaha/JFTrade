info:
  contact: {}
  description: JFTrade sidecar API 的调试文档。Swagger UI 主要覆盖当前常用的 HTTP 调试入口，并展示实时接口的请求方式。
  title: JFTrade Debug API
  version: 1.0.0
paths:
  /api/v1/adk:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取 ADK 快照
      tags:
      - adk
  /api/v1/adk/agents:
    get:
      parameters:
      - description: Agent 状态过滤
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取 ADK Agent 列表
      tags:
      - adk
  /api/v1/adk/providers:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取 ADK Provider 列表
      tags:
      - adk
  /api/v1/adk/runs:
    get:
      parameters:
      - description: 分页大小
        in: query
        name: limit
        type: integer
      - description: 分页偏移
        in: query
        name: offset
        type: integer
      - description: Run 状态
        in: query
        name: status
        type: string
      - description: Agent ID
        in: query
        name: agentId
        type: string
      - description: Session ID
        in: query
        name: sessionId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取 ADK Run 列表
      tags:
      - adk
  /api/v1/adk/sessions:
    get:
      parameters:
      - description: 分页大小
        in: query
        name: limit
        type: integer
      - description: 分页偏移
        in: query
        name: offset
        type: integer
      - description: Agent ID
        in: query
        name: agentId
        type: string
      - description: 搜索关键字
        in: query
        name: query
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取 ADK Session 列表
      tags:
      - adk
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用单管理员密钥签发 HttpOnly、SameSite=Strict 会话。
      parameters:
      - description: 管理员密钥
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/jftradeapi.adminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 管理员登录
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: 注销当前管理员会话。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 管理员注销
      tags:
      - auth
  /api/v1/auth/session:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取管理员会话
      tags:
      - auth
  /api/v1/auth/token:
    get:
      description: 始终返回 410 Gone；CLI 请直接使用管理员密钥作为 Bearer token。
      produces:
      - application/json
      responses:
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 旧令牌入口（已退役）
      tags:
      - auth
  /api/v1/backtests:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取回测列表
      tags:
      - backtest
    post:
      consumes:
      - application/json
      parameters:
      - description: 回测请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/jftradeapi.backtestStartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 启动回测
      tags:
      - backtest
  /api/v1/backtests/{runId}:
    delete:
      parameters:
      - description: 回测运行 ID
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 删除回测记录
      tags:
      - backtest
    get:
      parameters:
      - description: 回测运行 ID
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/jftradeapi.envelope'
            - properties:
                data:
                  $ref: '#/definitions/jftradeapi.backtestRunState'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取回测结果
      tags:
      - backtest
  /api/v1/backtests/{runId}/status:
    get:
      parameters:
      - description: 回测运行 ID
        in: path
        name: runId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取回测状态
      tags:
      - backtest
  /api/v1/backtests/sync:
    post:
      consumes:
      - application/json
      parameters:
      - description: 同步请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/jftradeapi.backtestSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 启动历史数据同步
      tags:
      - backtest
  /api/v1/brokers/{brokerId}/cash-flows:
    get:
      parameters:
      - description: 券商 ID
        in: path
        name: brokerId
        required: true
        type: string
      - description: 交易环境
        in: query
        name: tradingEnvironment
        type: string
      - description: 账户 ID
        in: query
        name: accountId
        type: string
      - description: 市场代码
        in: query
        name: market
        type: string
      - description: 清算日期
        in: query
        name: clearingDate
        required: true
        type: string
      - description: 方向
        in: query
        name: direction
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取券商资金流水
      tags:
      - broker
  /api/v1/brokers/{brokerId}/fills:
    get:
      parameters:
      - description: 券商 ID
        in: path
        name: brokerId
        required: true
        type: string
      - description: 交易环境
        in: query
        name: tradingEnvironment
        type: string
      - description: 账户 ID
        in: query
        name: accountId
        type: string
      - description: 市场代码
        in: query
        name: market
        type: string
      - description: CURRENT 或 HISTORY
        in: query
        name: scope
        type: string
      - description: 证券代码
        in: query
        name: symbol
        type: string
      - description: 历史查询起始时间
        in: query
        name: startTime
        type: string
      - description: 历史查询结束时间
        in: query
        name: endTime
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
      summary: 读取券商成交
      tags:
      - broker
  /api/v1/brokers/{brokerId}/funds:
    get:
      parameters:
      - description: 券商 ID
        in: path
        name: brokerId
        required: true
        type: string
      - description: 交易环境
        in: query
        name: tradingEnvironment
        type: string
      - description: 账户 ID
        in: query
        name: accountId
        type: string
      - description: 市场代码
        in: query
        name: market
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jftradeapi.envelope'
        "400":
