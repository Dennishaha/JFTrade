# Minimal bbgo config for jftrade with a single Futu session.
# FutuOpenD defaults: API port 11110, WebSocket port 11111.
# FUTU_OPEND_ADDR points at the native OpenD API endpoint (e.g. 127.0.0.1:11110).
---
sessions:
  futu:
    exchange: futu
    envVarPrefix: futu

# No strategies wired by default; add under `exchangeStrategies:` as needed.
